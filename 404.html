<!Doctype html>
<html>
<head>
  <script src="GridWorms.js"></script>
  <link rel="preload" as="style" href="scrollbar.css">
  <link rel="stylesheet" href="scrollbar.css">
  <!--<meta http-equiv = "refresh" content = "0; url = https://h3lix-fire.github.io/comingsoon.html" />-->
  <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="16x16">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>H3lix Client</title>
  <style>

  *{
    transition: all 0.6s;
  }

  html {
    height: 100%;
  }

  body{
    font-family: 'Lato', sans-serif;
    color: #333;
    margin: 0;
  }

  #main{
    display: table;
    width: 100%;
    height: 100vh;
    text-align: center;
  }

  .fof{
    display: table-cell;
    vertical-align: middle;
  }

  .fof h1{
    font-size: 50px;
    display: inline-block;
    padding-right: 12px;
    animation: type .5s alternate infinite;
  }

  @keyframes type{
    from{box-shadow: inset -3px 0px 0px #888;}
    to{box-shadow: inset -3px 0px 0px transparent;}
  }
  </style>
</head>
<body>
  <div id="main">
    <div class="fof">
      <h1>Error <font style="color:orange">404</font></h1>
    </div>
  </div>
</body>
